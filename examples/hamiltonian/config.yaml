# Hamiltonian mechanics — proper QGRE showcase with phase-gated curriculum
# 121 sympy-verified problems, 4-phase progressive reward, difficulty-gated prompt release

model:
  path: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
  lora_rank: 8
  lora_alpha: 16
  load_in_4bit: true
  fast_inference: true
  gpu_memory_utilization: 0.35

data:
  train_files:
    - examples/hamiltonian/data/train.parquet
  max_prompt_length: 1024
  train_batch_size: 4
  prompt_column: prompt
  system_prompt_column: system_prompt  # Separate system message in chat template
  metadata_columns:
    - ground_truth
    - H_expr
    - T_expr
    - V_expr
    - dqdt
    - dpdt
    - coordinates
    - difficulty
    - system
  difficulty_column: difficulty
  # 2D mastery matrix curriculum — more granular tiers with system prompt fade
  # tier1/edge: full prompt | tier1b/tier2: abbreviated | tier2b/tier3: minimal | tier3b+: none
  # Tutorial phases: learn sub-skills in isolation, then combine
  tier_order: [tutorial_gravity, tutorial_spring, combined, tier1, edge, tier1b, tier2, tier2b, tier3, tier3b, tier4, adversarial]
  tier_advance_quality_phase: 4    # Must master through potential energy before next tier
  tier_advance_threshold: 0.80     # Mastery threshold for tier advancement
  initial_tiers: [tutorial_gravity]  # Start on freefall ONLY

generation:
  temperature: 1.0
  top_p: 1.0
  lora_dropout_rate: 0.15
  lora_dropout_anneal_steps: 2000
  top_k: -1
  max_tokens: 4096
  stop_token_ids: [151643, 151645]

algorithm:
  mode: spo
  spo:
    lr: 0.01
    n: 1
    kl_adaptive: false
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  llds_coef: 0.0
  loss_type: dr_grpo
  segmenter: hamiltonian
  length_penalty_coef: 0.005
  length_penalty_threshold: 0.6

  step_qualities:
    1: [q_format, q_has_math]
    2: [q_momentum_defined]
    3: [q_T_uses_p]
    4: [q_V_correct]
    5: [q_correct_H]
    6: [q_correct_dqdt, q_correct_dpdt, q_consistency]
    7: [q_defines_momentum]
    8: [q_T_in_momentum, q_H_in_momentum]
    9: [q_correct_coefficient, q_derivative_correct]

  # Map virtual steps (no segmenter region) to the region whose tokens carry their advantage
  step_region_map:
    7: 2    # q_defines_momentum → MOMENTUM section tokens (STEP_2)
    8: 3    # q_T_in_momentum, q_H_in_momentum → KINETIC section tokens (STEP_3)
    9: 6    # q_correct_coefficient, q_derivative_correct → EQUATIONS section tokens (STEP_6)

training:
  total_steps: 7000
  lr: 5.0e-6
  warmup_steps: 10
  lr_scheduler: cosine
  save_freq: 50
  gradient_accumulation_steps: 1
  mastery_threshold: 0.8
  stagnation_timeout: 50

vprm:
  enabled: true
  intermediate_dim: 128
  lr: 0.0001
  clip_advantage: 5.0
  spo_fallback_min_regions: 2

logging:
  mlflow_experiment: hamiltonian-curriculum-400
  completion_dir: output/hamiltonian/completions
  checkpoint_dir: output/hamiltonian/checkpoints
