# Hamiltonian mechanics — proper QGRE showcase with phase-gated curriculum
# 121 sympy-verified problems, 4-phase progressive reward, difficulty-gated prompt release

model:
  path: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
  lora_rank: 32
  lora_alpha: 64
  load_in_4bit: true
  fast_inference: true
  gpu_memory_utilization: 0.17        # Minimal viable KV cache for 4 sequences
  weight_sync_strategy: merge         # Merge LoRA → base pre-generate, unmerge post-generate
                                      # Eliminates ~1.4 GB vLLM weight duplication + LoRA buffer
  pad_token: "<|fim_pad|>"      # Must NOT be EOS, stop token, or vision-reserved
  pad_token_id: 151662          # Qwen3 fim_pad — vision_pad blocked by Unsloth for text models
  lora_target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]  # Qwen3/LLaMA
  modules_to_save: [lm_head]  # embed_tokens removed — fim_pad is pre-trained, saves ~1.2 GB

data:
  train_files:
    - examples/hamiltonian/data/train.parquet
  max_prompt_length: 1024
  train_batch_size: 4
  prompt_column: prompt
  system_prompt_column: system_prompt  # Separate system message in chat template
  metadata_columns:
    - ground_truth
    - H_expr
    - T_expr
    - V_expr
    - dqdt
    - dpdt
    - coordinates
    - difficulty
    - system
  difficulty_column: difficulty
  # 2D mastery matrix curriculum — more granular tiers with system prompt fade
  # tier1/edge: full prompt | tier1b/tier2: abbreviated | tier2b/tier3: minimal | tier3b+: none
  # Tutorial phases: learn sub-skills in isolation, then combine
  tier_order: [tutorial_gravity, tutorial_spring, combined, tier1, edge, tier1b, tier2, tier2b, tier3, tier3b, tier4, adversarial]
  tier_advance_quality_phase: 4    # Must master through potential energy before next tier
  tier_advance_threshold: 0.80     # Mastery threshold for tier advancement
  initial_tiers: [tutorial_gravity]  # Start on freefall ONLY

generation:
  temperature: 0.7
  top_p: 0.8
  top_k: 20
  min_p: 0.1
  lora_dropout_rate: 0.0              # Disabled — was masking real capability for 3000 steps
  lora_dropout_anneal_steps: 3000
  max_tokens: 4096
  repetition_penalty: 1.2
  stop_token_ids: [151643, 151645]

algorithm:
  mode: spo
  spo:
    lr: 0.01
    n: 1
    kl_adaptive: false
    aspiration_beta: 0.5             # Aspiration gap weight
    aspiration_target: 1.0           # Perfect score — keeps gradient alive until all qualities hit 1.0
  spo_filter_threshold: 0.0001       # Lower threshold so marginal advantages don't get filtered
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  llds_coef: 0.05
  loss_type: dr_grpo
  use_triton_logprobs: true   # Triton fused forward, PyTorch backward
  segmenter: hamiltonian
  length_penalty_coef: 0.005
  length_penalty_threshold: 0.6
  advantage_scale: 0.1  # Calibrated via gradient probe - moves logits 0.06% of gap per step
  min_completion_tokens: 50  # Negative reward floor for empty/near-empty completions
  # Attention-constrained advantage: dampen advantage for high-bond tokens
  attention_constrained_advantage: true
  attention_constraint_strength: 1.0
  attention_constraint_mode: max_received
  attention_sample_layer: -1  # Last layer

  # Correctness-only qualities — no format scoring. RL teaches WHAT (math),
  # SFT teaches HOW (formatting). Format scoring is the #1 reward hacking
  # vector (gradient regularization paper arxiv:2602.18037).
  #
  # Steps 1-4 are the curriculum phases. Steps 5-6 map to the Hamiltonian
  # segmenter's STEP_5/STEP_6 regions (used as fallback when scored_spans
  # are unavailable for some samples in a batch). Without these, the A4
  # heterogeneous-batch guard forces segmenter mode and the unmatched
  # regions get zero advantage, causing all-empty-masks crash in the critic.
  step_qualities:
    1: [q_kinetic, q_potential]       # Can the model get T and V right?
    2: [q_hamiltonian]                # Can it compose H = T + V correctly?
    3: [q_dqdt, q_dpdt]              # Can it derive Hamilton's equations?
    4: [q_consistency]                # Are the equations consistent with H?
    5: [q_dqdt, q_dpdt]              # Segmenter fallback: EQUATIONS region
    6: [q_consistency]                # Segmenter fallback: final section

training:
  total_steps: 7000
  lr: 5.0e-6
  warmup_steps: 10
  lr_scheduler: cosine
  save_freq: 50
  kv_cache_flush_freq: 0  # Disabled — MERGE strategy shares memory, no VRAM leak
  gradient_accumulation_steps: 1
  mastery_threshold: 0.8
  stagnation_timeout: 50
  log_attention_patterns: true  # Detect laminar→turbulent transitions
  attention_log_freq: 10  # Log attention stats every 10 steps

vprm:
  enabled: true
  intermediate_dim: 128
  lr: 0.0001
  clip_advantage: 5.0
  spo_fallback_min_regions: 2

egrs:
  enabled: true
  reward_threshold: 0.5
  entropy_threshold: 0.5
  gate_temperature: 0.1
  exploration_weight: 0.1
  hint_enabled: true
  mastery_threshold: 0.8
  hint_extractor: hamiltonian  # Use Hamiltonian-specific extractor (T_expr, V_expr, H_expr)

tutorial:
  enabled: true
  post_mastery_behavior: review_only
  untracked_always_active: true
  sequential_mastery: true  # Focus on one skill at a time
  skill_tree:
    # Root skills — no prerequisites, high threshold (easy tasks, high standard)
    # match_metadata selects prompts from training data by metadata column values
    # Learnability-based advancement: skill advances when mastery_threshold met
    # AND learnability (p*(1-p)) drops below learnability_threshold.
    # p=0.80 → learnability=0.16, p=0.85 → learnability=0.1275
    freefall:
      match_metadata: {system: freefall}
      prerequisites: []
      mastery_threshold: 0.80
      regression_threshold: 0.65
      mastery_window: 20
      review_probability: 0.30
      score_key: q_potential
      learnability_threshold: 0.17  # Advance when p >= 0.80

    spring_only:
      match_metadata: {system: spring}
      prerequisites: [freefall]  # Must master freefall before spring
      mastery_threshold: 0.80
      regression_threshold: 0.65
      mastery_window: 20
      review_probability: 0.30
      score_key: q_potential
      learnability_threshold: 0.17

    # Compound skills — prerequisites required, lower threshold
    # Tutorial-tracked prompts bypass tier gate — skill gate is the authority
    gravity_spring:
      match_metadata: {system: gravity_spring}
      prerequisites: [freefall, spring_only]
      mastery_threshold: 0.75
      regression_threshold: 0.55
      mastery_window: 20
      review_probability: 0.30
      score_key: q_hamiltonian
      learnability_threshold: 0.20  # More lenient for compound skills

    damped_spring:
      match_metadata: {system: stiff_spring}
      prerequisites: [spring_only]
      mastery_threshold: 0.75
      regression_threshold: 0.55
      mastery_window: 20
      review_probability: 0.30
      score_key: q_hamiltonian
      learnability_threshold: 0.20

    # Boss level — multiple interacting components
    driven_oscillator:
      match_metadata: {system: duffing}
      prerequisites: [gravity_spring, damped_spring]
      mastery_threshold: 0.70
      regression_threshold: 0.50
      mastery_window: 20
      review_probability: 0.30
      score_key: q_hamiltonian
      learnability_threshold: 0.22  # Most lenient — boss is harder

logging:
  mlflow_experiment: hamiltonian-curriculum-400
  completion_dir: output/hamiltonian/completions
  checkpoint_dir: output/hamiltonian/checkpoints
  grad_log_freq: 10  # Log per-quality gradient flow proxy every N steps
