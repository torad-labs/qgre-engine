# Hamiltonian mechanics — 50-step real training smoke test
# Verifiable: all answers are symbolic derivatives, ground truth in metadata

model:
  path: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
  lora_rank: 8
  lora_alpha: 16
  load_in_4bit: true
  fast_inference: true
  gpu_memory_utilization: 0.35

data:
  train_files:
    - examples/hamiltonian/data/train.parquet
  max_prompt_length: 512
  train_batch_size: 4
  prompt_column: prompt
  metadata_columns: [ground_truth, dqdt, dpdt, difficulty, system, H_key]

generation:
  temperature: 1.0
  top_p: 1.0
  top_k: -1
  max_tokens: 1024          # Hamiltonian derivations are short
  stop_token_ids: [151643, 151645]

algorithm:
  mode: spo
  spo:
    lr: 0.1
    n: 1
  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  llds_coef: 0.0            # Off for smoke test
  loss_type: grpo

  # Uniform segmenter → all tokens are STEP_1 → all qualities must be in step 1
  step_qualities:
    1: [q_format, q_identifies_T, q_identifies_V, q_correct_dqdt, q_correct_dpdt]

training:
  total_steps: 50
  lr: 1.0e-5               # Slightly higher lr for short run
  warmup_steps: 3
  lr_scheduler: cosine
  save_freq: 25
  gradient_accumulation_steps: 1
  mastery_threshold: 0.85

logging:
  mlflow_experiment: hamiltonian-smoke-50
  completion_dir: output/hamiltonian/completions
  checkpoint_dir: output/hamiltonian/checkpoints
