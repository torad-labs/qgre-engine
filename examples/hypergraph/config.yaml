# Hypergraph decomposability — QGRE engine config
# Smoke test model: Qwen3-1.7B (fits on RTX 5080 16GB with vLLM)

model:
  path: unsloth/Qwen3-1.7B-unsloth-bnb-4bit
  lora_rank: 8
  lora_alpha: 16
  load_in_4bit: true
  fast_inference: true
  gpu_memory_utilization: 0.6

data:
  train_files:
    - data/tier_1_2.parquet
  max_prompt_length: 3200
  max_response_length: 2048
  train_batch_size: 16

generation:
  temperature: 1.0          # GRPO/SPO: 1.0 for diversity (DeepSeek-R1 default)
  top_p: 1.0               # no nucleus filtering (let temperature control diversity)
  top_k: -1                # disabled
  max_tokens: 4096
  stop_token_ids: [151643, 151645]  # <|endoftext|>, <|im_end|>

algorithm:
  mode: spo               # or "grpo"
  spo:
    lr: 0.1                # EMA learning rate for value tracker
    n: 1                   # completions per prompt
  grpo:
    n: 8
    filter_groups: true

  clip_ratio_low: 0.2
  clip_ratio_high: 0.28
  loss_mode: kl_cov
  kl_cov_ratio: 0.0002
  llds_coef: 0.05
  entropy_coeff: 0.001    # 0.0 on 16GB consumer GPU

  # Domain-specific: which qualities belong to which step
  # The engine uses this to compute per-step advantages
  step_qualities:
    1: [q_format_tags, q_tag_content, q_node_in_prompt, q_node_format, q_node_length]
    2: [q_chain_s2_refs_s1]
    3: [q_chain_s3_refs_s2, q_self_consistency]
    4: [q_step4_valid_json, q_step4_has_keys, q_existence_correct, q_archetype_correct, q_node_f1]

training:
  total_steps: 800
  lr: 5.0e-6
  warmup_steps: 10
  lr_scheduler: cosine
  save_freq: 50
  gradient_accumulation_steps: 1

logging:
  mlflow_experiment: hypergraph-scan-v1
  completion_dir: output/completions
  checkpoint_dir: output/checkpoints
